<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>JAI Academy | Joshua's Artificial Intelligence</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0a0f1e 0%, #0a1a2a 100%);
            min-height: 100vh;
            color: #e2e8f0;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 30px 20px;
            background: rgba(15, 25, 45, 0.7);
            border-radius: 30px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 255, 255, 0.2);
        }

        .header h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #00d4ff, #00ffaa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }

        .header p {
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .badge {
            display: inline-block;
            background: rgba(0, 255, 255, 0.1);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            color: #00d4ff;
            margin-top: 10px;
        }

        .admin-link {
            position: fixed;
            bottom: 20px;
            right: 20px;
            font-size: 0.7rem;
            color: #4a5568;
            text-decoration: none;
            background: rgba(0, 0, 0, 0.5);
            padding: 6px 12px;
            border-radius: 20px;
            z-index: 100;
        }

        .admin-link:hover {
            color: #00d4ff;
        }

        /* Chat Container */
        .chat-container {
            background: rgba(10, 20, 35, 0.6);
            border-radius: 24px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            overflow: hidden;
            margin-bottom: 20px;
        }

        .messages {
            height: 500px;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            display: flex;
            gap: 12px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.user .bubble {
            background: linear-gradient(135deg, #00d4ff, #00aa88);
            color: #0a0f1e;
            border-radius: 20px 20px 8px 20px;
        }

        .message.ai .bubble {
            background: rgba(30, 45, 65, 0.9);
            border-radius: 20px 20px 20px 8px;
            border: 1px solid rgba(0, 255, 255, 0.2);
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .message.ai .avatar {
            background: linear-gradient(135deg, #00d4ff, #00ffaa);
        }

        .message.user .avatar {
            background: #2d3748;
            order: 2;
        }

        .bubble {
            max-width: 75%;
            padding: 12px 16px;
            font-size: 0.95rem;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .type-badge {
            font-size: 0.65rem;
            opacity: 0.5;
            margin-top: 4px;
            margin-left: 48px;
        }

        /* Input Area */
        .input-area {
            padding: 16px;
            background: rgba(15, 25, 45, 0.9);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            gap: 12px;
        }

        .input-area input {
            flex: 1;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 40px;
            padding: 14px 20px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
        }

        .input-area input:focus {
            border-color: #00d4ff;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.2);
        }

        .input-area input::placeholder {
            color: #4a5568;
        }

        .input-area button {
            background: linear-gradient(135deg, #00d4ff, #00aa88);
            border: none;
            border-radius: 40px;
            padding: 0 28px;
            font-weight: bold;
            color: #0a0f1e;
            cursor: pointer;
            transition: transform 0.2s;
            font-size: 1rem;
        }

        .input-area button:hover {
            transform: scale(1.02);
        }

        .input-area button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Lesson Banner */
        .lesson-banner {
            background: rgba(0, 212, 255, 0.1);
            border-radius: 12px;
            padding: 10px 16px;
            margin-bottom: 16px;
            font-size: 0.8rem;
            text-align: center;
            border: 1px solid rgba(0, 212, 255, 0.2);
        }

        .lesson-banner strong {
            color: #00d4ff;
        }

        /* Footer */
        .footer {
            text-align: center;
            font-size: 0.7rem;
            color: #4a5568;
            margin-top: 20px;
            padding: 16px;
        }

        /* Scrollbar */
        .messages::-webkit-scrollbar {
            width: 6px;
        }

        .messages::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 3px;
        }

        .messages::-webkit-scrollbar-thumb {
            background: #00d4ff;
            border-radius: 3px;
        }

        @media (max-width: 600px) {
            body {
                padding: 12px;
            }
            
            .bubble {
                max-width: 85%;
                font-size: 0.85rem;
            }
            
            .header h1 {
                font-size: 1.5rem;
            }
            
            .messages {
                height: 450px;
            }
            
            .avatar {
                width: 32px;
                height: 32px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🛡️ JAI Academy</h1>
            <p>Joshua's Artificial Intelligence — Your Cyber Security Teacher</p>
            <div class="badge">🤖 Created by Joshua Giwa | 🇳🇬 Yukuben, Nigeria</div>
        </div>

        <div class="chat-container">
            <div class="messages" id="messages">
                <div class="message ai">
                    <div class="avatar">🤖</div>
                    <div class="bubble" id="welcomeMessage">
                        Loading JAI...
                    </div>
                </div>
            </div>

            <div class="input-area">
                <input type="text" id="messageInput" placeholder="Ask JAI about cyber security..." autocomplete="off">
                <button id="sendBtn">Send</button>
            </div>
        </div>

        <div class="lesson-banner" id="lessonBanner">
            📚 Loading current lesson...
        </div>

        <div class="footer">
            🎓 JAI — Joshua's Artificial Intelligence | Teaching cyber security, one lesson at a time
        </div>
    </div>

    <a href="/admin/login-page" class="admin-link">🔐 Admin</a>

    <script>
        // Configuration
        const API_URL = window.location.origin;
        
        // DOM Elements
        const messagesContainer = document.getElementById('messages');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const lessonBanner = document.getElementById('lessonBanner');
        
        // Generate a unique user ID for this session
        let userId = localStorage.getItem('jai_user_id');
        if (!userId) {
            userId = 'user_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('jai_user_id', userId);
        }
        
        let currentLesson = "No lesson uploaded";
        
        // Helper: Add message to chat
        function addMessage(message, isUser = false, type = 'jai') {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'ai'}`;
            
            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.textContent = isUser ? '👤' : '🤖';
            
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.innerHTML = message.replace(/\n/g, '<br>');
            
            messageDiv.appendChild(avatar);
            messageDiv.appendChild(bubble);
            
            messagesContainer.appendChild(messageDiv);
            
            // Add type badge for AI responses
            if (!isUser && type !== 'jai') {
                const typeBadge = document.createElement('div');
                typeBadge.className = 'type-badge';
                typeBadge.innerHTML = '🤖 JAI';
                messageDiv.appendChild(typeBadge);
            }
            
            // Scroll to bottom
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }
        
        // Helper: Show typing indicator
        function showTyping() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message ai';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = `
                <div class="avatar">🤖</div>
                <div class="bubble" style="padding: 12px 20px;">
                    <span style="opacity:0.7;">JAI is thinking</span><span style="animation: blink 1s infinite;">...</span>
                </div>
            `;
            messagesContainer.appendChild(typingDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
            
            // Add animation style if not exists
            if (!document.querySelector('#typingStyle')) {
                const style = document.createElement('style');
                style.id = 'typingStyle';
                style.textContent = `
                    @keyframes blink {
                        0%, 100% { opacity: 0.3; }
                        50% { opacity: 1; }
                    }
                `;
                document.head.appendChild(style);
            }
        }
        
        function hideTyping() {
            const typing = document.getElementById('typingIndicator');
            if (typing) typing.remove();
        }
        
        // Load current lesson
        async function loadCurrentLesson() {
            try {
                const response = await fetch('/admin/lesson');
                const data = await response.json();
                currentLesson = data.lesson;
                
                if (data.loaded) {
                    lessonBanner.innerHTML = `📖 <strong>Today's Lesson:</strong> ${data.lesson}`;
                } else {
                    lessonBanner.innerHTML = `📚 <strong>JAI Academy</strong> — No lesson uploaded yet. Check back soon!`;
                }
            } catch (error) {
                console.error('Error loading lesson:', error);
                lessonBanner.innerHTML = `📚 JAI Academy — Ready to learn cyber security!`;
            }
        }
        
        // Set welcome message based on lesson
        function setWelcomeMessage() {
            if (currentLesson && currentLesson !== "No lesson uploaded") {
                addMessage(`👋 Welcome to **JAI Academy**!\n\nI am **JAI** — Joshua's Artificial Intelligence, created by Joshua Giwa from Yukuben, Nigeria.\n\n📖 Today's lesson: **${currentLesson}**\n\nI'll guide you through this lesson step by step. What would you like to know about ${currentLesson}? Or shall I start from the beginning? 😊`, false);
            } else {
                addMessage(`👋 Welcome to **JAI Academy**!\n\nI am **JAI** — Joshua's Artificial Intelligence, created by Joshua Giwa from Yukuben, Nigeria.\n\n📚 A new lesson will be uploaded soon. In the meantime, you can ask me about cyber security basics, malware, reverse engineering, or how to get started in cyber security.\n\nWhat would you like to learn? 😊`, false);
            }
        }
        
        // Send message to JAI
        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;
            
            // Add user message to chat
            addMessage(message, true);
            messageInput.value = '';
            messageInput.focus();
            
            // Show typing indicator
            showTyping();
            
            try {
                const response = await fetch(`${API_URL}/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: message,
                        userId: userId
                    })
                });
                
                const data = await response.json();
                
                hideTyping();
                
                if (response.ok) {
                    addMessage(data.response, false, data.type || 'jai');
                } else {
                    addMessage(`❌ Error: ${data.error || 'Something went wrong'}`, false);
                }
            } catch (error) {
                hideTyping();
                addMessage(`❌ Connection error: ${error.message}. Please refresh and try again.`, false);
                console.error('Error:', error);
            }
        }
        
        // Event Listeners
        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
        
        // Initialize
        async function init() {
            await loadCurrentLesson();
            setWelcomeMessage();
            messageInput.focus();
        }
        
        init();
    </script>
</body>
</html>

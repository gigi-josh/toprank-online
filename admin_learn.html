<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAI Learning Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0f1e, #0a1a2a);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: white;
            padding: 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        .card {
            background: rgba(15,25,45,0.9);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid rgba(0,212,255,0.2);
        }
        h1 { color: #00d4ff; margin-bottom: 8px; }
        h2 { color: #00d4ff; font-size: 1.3rem; margin-bottom: 16px; }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: rgba(0,212,255,0.1);
            padding: 20px;
            border-radius: 16px;
            text-align: center;
        }
        .stat-number { font-size: 2rem; font-weight: bold; color: #00d4ff; }
        .stat-label { font-size: 0.8rem; color: #94a3b8; }
        .suggestion {
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            border-left: 3px solid #ffaa44;
        }
        .suggestion-question { font-weight: bold; margin-bottom: 8px; color: #ffaa44; }
        .suggestion-answer { color: #94a3b8; margin-bottom: 12px; }
        .btn-group { display: flex; gap: 10px; }
        .btn-approve {
            background: #00aa88;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-reject {
            background: #aa4444;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-auto {
            background: #4466aa;
            border: none;
            padding: 10px 24px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            margin-right: 10px;
        }
        .btn-add {
            background: #00d4ff;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
        }
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 8px; color: #94a3b8; }
        input, textarea {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid rgba(0,212,255,0.3);
            background: rgba(0,0,0,0.4);
            color: white;
            font-size: 0.9rem;
        }
        textarea { min-height: 80px; resize: vertical; }
        .success { background: rgba(0,255,0,0.2); color: #0f0; padding: 10px; border-radius: 12px; margin-top: 10px; }
        .error { background: rgba(255,0,0,0.2); color: #f66; padding: 10px; border-radius: 12px; margin-top: 10px; }
        hr { border-color: rgba(255,255,255,0.1); margin: 20px 0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🧠 JAI Learning Dashboard</h1>
            <p>Teach JAI from conversations — approve suggestions, add Q&A, or auto-learn from chat history.</p>
        </div>

        <div class="stats" id="stats">
            <div class="stat-card"><div class="stat-number">-</div><div class="stat-label">Total Q&A</div></div>
            <div class="stat-card"><div class="stat-number">-</div><div class="stat-label">Pending</div></div>
            <div class="stat-card"><div class="stat-number">-</div><div class="stat-label">Conversations</div></div>
        </div>

        <div class="card">
            <h2>➕ Add Q&A Manually</h2>
            <div class="form-group">
                <label>Question:</label>
                <input type="text" id="newQuestion" placeholder="e.g., What is phishing?">
            </div>
            <div class="form-group">
                <label>Answer:</label>
                <textarea id="newAnswer" placeholder="e.g., Phishing is when scammers pretend to be someone you trust..."></textarea>
            </div>
            <button class="btn-add" onclick="addQA()">📚 Add to JAI</button>
            <div id="addStatus"></div>
        </div>

        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                <h2>📖 Pending Suggestions</h2>
                <button class="btn-auto" onclick="autoLearn()">🤖 Auto-Learn from History</button>
            </div>
            <div id="pendingList">Loading...</div>
        </div>
    </div>

    <script>
        async function loadStats() {
            const res = await fetch('/admin/learn');
            const data = await res.json();
            document.querySelectorAll('.stat-card')[0].querySelector('.stat-number').textContent = data.total_taught || 0;
            document.querySelectorAll('.stat-card')[1].querySelector('.stat-number').textContent = data.pending?.length || 0;
            document.querySelectorAll('.stat-card')[2].querySelector('.stat-number').textContent = data.total_conversations || 0;
            
            const pendingDiv = document.getElementById('pendingList');
            if (data.pending && data.pending.length > 0) {
                pendingDiv.innerHTML = data.pending.map(s => `
                    <div class="suggestion">
                        <div class="suggestion-question">❓ ${escapeHtml(s.message)}</div>
                        <div class="suggestion-answer">💡 ${escapeHtml(s.suggested_response)}</div>
                        <div class="btn-group">
                            <button class="btn-approve" onclick="approve(${s.id})">✅ Approve & Teach</button>
                            <button class="btn-reject" onclick="reject(${s.id})">❌ Reject</button>
                        </div>
                        <div style="font-size:0.7rem; margin-top:8px;">From: ${s.user_id} | ${new Date(s.created_at).toLocaleString()}</div>
                    </div>
                `).join('');
            } else {
                pendingDiv.innerHTML = '<p style="color: #64748b;">No pending suggestions. JAI is learning well!</p>';
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        async function approve(id) {
            const res = await fetch(`/admin/learn/approve/${id}`, { method: 'POST' });
            const data = await res.json();
            if (data.success) {
                loadStats();
            } else {
                alert('Error approving');
            }
        }
        
        async function reject(id) {
            const res = await fetch(`/admin/learn/reject/${id}`, { method: 'POST' });
            const data = await res.json();
            if (data.success) {
                loadStats();
            }
        }
        
        async function addQA() {
            const question = document.getElementById('newQuestion').value.trim();
            const answer = document.getElementById('newAnswer').value.trim();
            const statusDiv = document.getElementById('addStatus');
            
            if (!question || !answer) {
                statusDiv.innerHTML = '<div class="error">❌ Question and answer required</div>';
                return;
            }
            
            const res = await fetch('/admin/learn/add', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question, answer })
            });
            const data = await res.json();
            
            if (data.success) {
                statusDiv.innerHTML = '<div class="success">✅ Added to JAI!</div>';
                document.getElementById('newQuestion').value = '';
                document.getElementById('newAnswer').value = '';
                loadStats();
                setTimeout(() => statusDiv.innerHTML = '', 3000);
            } else {
                statusDiv.innerHTML = `<div class="error">❌ ${data.error}</div>`;
            }
        }
        
        async function autoLearn() {
            const res = await fetch('/admin/learn/auto', { method: 'POST' });
            const data = await res.json();
            if (data.success) {
                alert(`🤖 Auto-learned ${data.learned?.length || 0} conversations. Check pending list!`);
                loadStats();
            }
        }
        
        loadStats();
        setInterval(loadStats, 30000);
    </script>
</body>
</html>
